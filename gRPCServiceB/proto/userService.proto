syntax = "proto3";
package UserService;

service UserService {
  rpc getUser (UserRequest) returns (UserResponse);
}

message UserRequest {
  string token = 1;
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string verified_at = 4;
}

message UserResponse {
  bool success = 1;
  string message = 2;
  User user = 3;
}
